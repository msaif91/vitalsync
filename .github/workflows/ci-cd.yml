name: VitalSync CI/CD Pipeline

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  # ---- Étape 1 : Tests ----
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installation des dépendances
        run: |
          cd backend
          npm install

      - name: Exécution des tests Jest
        run: |
          cd backend
          npm test

  # ---- Étape 2 : Build Docker ----
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build et push image backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/vitalsync-backend:${{ github.sha }} ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/vitalsync-backend:${{ github.sha }}

      - name: Build et push image frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/vitalsync-frontend:${{ github.sha }} ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/vitalsync-frontend:${{ github.sha }}

  # ---- Étape 3 : Déploiement staging ----
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Déploiement avec Docker Compose
        run: |
          docker compose up -d --build

      - name: Attente du démarrage des services
        run: sleep 10

      - name: Health check du backend
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
          if [ "$response" != "200" ]; then
            echo "Health check échoué (HTTP $response)"
            exit 1
          fi
          echo "Health check OK (HTTP 200)"